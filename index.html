<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPainter Wall Calculator</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #111;
      border: 2px solid #f5d000;
      border-radius: 20px;
      padding: 24px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 18px;
    }

    .logo-wrap img {
      max-width: 220px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #f5d000;
    }

    .subtitle {
      text-align: center;
      color: #ccc;
      margin-bottom: 20px;
    }

    label {
      margin-top: 12px;
      display: block;
      color: #f5d000;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      background: #f5d000;
      color: #000;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
    }

    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 28px;
      color: #f5d000;
      font-weight: bold;
    }

    .summary {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="logo-wrap">
    <img src="logo.png">
  </div>

  <h1 id="appTitle">Wall Calculator</h1>
  <div class="subtitle" id="appSubtitle">iPainter Product Quantity Calculator</div>

  <label>Language</label>
  <select id="language" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="ms">Bahasa Melayu</option>
  </select>

  <label id="heightLabel">Wall Height (ft)</label>
  <input type="number" id="height">

  <label id="lengthLabel">Wall Length (ft)</label>
  <input type="number" id="length">

  <label id="productLabel">Product</label>
  <select id="product">
    <option value="fluted">Fluted Panel</option>
    <option value="marble">Marble Board</option>
    <option value="ps">PS Wall Panel</option>
    <option value="ceiling">Ceiling</option>
    <option value="pu">PU Stone</option>
    <option value="acousticS">Acoustic Panel Small</option>
    <option value="acousticB">Acoustic Panel Big</option>
    <option value="softS">Soft Stone Small</option>
    <option value="softB">Soft Stone Big</option>
    <option value="miniWall">Mini Wall Board</option>
    <option value="wallBoard">Wall Board</option>
  </select>

  <label id="wasteLabel">Wastage (%)</label>
  <input type="number" id="waste" value="10">

  <button onclick="calculate()" id="calculateBtn">Calculate</button>

  <div class="result" id="result">0 pcs</div>

  <div class="summary" id="summary"></div>

</div>

<script>
const products = {
  fluted: { w: 0.5, h: 9.5 },
  marble: { w: 4, h: 9.5 },
  ps: { w: 1, h: 9.5 },
  ceiling: { w: 1, h: 21 },
  pu: { w: 2, h: 4 },
  acousticS: { w: 2, h: 2 },
  acousticB: { w: 2, h: 2 },
  softS: { w: 2, h: 4 },
  softB: { w: 4, h: 8 },
  miniWall: { w: 2, h: 9.5 },
  wallBoard: { w: 4, h: 9.5 }
};

const text = {
  en: {
    height: "Wall Height (ft)",
    length: "Wall Length (ft)",
    product: "Product",
    waste: "Wastage (%)",
    calculate: "Calculate"
  },
  ms: {
    height: "Tinggi Dinding (ft)",
    length: "Panjang Dinding (ft)",
    product: "Produk",
    waste: "Wastage (%)",
    calculate: "Kira"
  }
};

function changeLanguage() {
  let lang = document.getElementById("language").value;
  document.getElementById("heightLabel").innerText = text[lang].height;
  document.getElementById("lengthLabel").innerText = text[lang].length;
  document.getElementById("productLabel").innerText = text[lang].product;
  document.getElementById("wasteLabel").innerText = text[lang].waste;
  document.getElementById("calculateBtn").innerText = text[lang].calculate;
}

function calculate() {
  let h = parseFloat(document.getElementById("height").value);
  let l = parseFloat(document.getElementById("length").value);
  let waste = parseFloat(document.getElementById("waste").value);
  let p = products[document.getElementById("product").value];

  if (!h || !l) return;

  let wallArea = h * l;
  let panelArea = p.w * p.h;
  let qty = wallArea / panelArea;
  qty = qty * (1 + waste / 100);

  document.getElementById("result").innerText = Math.ceil(qty) + " pcs";

  document.getElementById("summary").innerText =
    "Wall Area: " + wallArea.toFixed(2) + " sq ft\n" +
    "Panel Size: " + p.w + " x " + p.h + " ft";
}
</script>

</body>
</html>
